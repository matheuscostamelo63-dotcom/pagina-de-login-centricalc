<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - CentriCalc</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="logo.png" alt="CentriCalc Logo" class="main-logo" onerror="this.style.display='none'">
            <h1>Nova Senha</h1>
            <p>Escolha uma senha forte e segura</p>
        </div>

        <div id="error-alert" class="error-message"></div>
        <div id="success-alert" class="error-message"
            style="background: #f0fdf4; border-color: #bbf7d0; color: #15803d; display: none;"></div>

        <form id="reset-password-form">
            <div class="form-group">
                <label for="password">Nova Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div class="password-requirements" id="pwd-reqs">
                    <p class="req" id="req-length">• Mínimo 8 caracteres</p>
                    <p class="req" id="req-upper">• Letra maiúscula</p>
                    <p class="req" id="req-lower">• Letra minúscula</p>
                    <p class="req" id="req-num">• Número</p>
                    <p class="req" id="req-special">• Caractere especial</p>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirmar Nova Senha</label>
                <input type="password" id="confirm-password" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submit-btn" class="btn btn-primary">
                <span>Redefinir Senha</span>
                <div id="spinner" class="loading-spinner"></div>
            </button>
        </form>
    </div>

    <script src="auth.js"></script>
    <script>
        // Reutilizando lógica de validação visual
        const pwd = document.getElementById('password');
        const reqs = {
            length: document.getElementById('req-length'),
            upper: document.getElementById('req-upper'),
            lower: document.getElementById('req-lower'),
            num: document.getElementById('req-num'),
            special: document.getElementById('req-special')
        };

        pwd.addEventListener('input', () => {
            const val = pwd.value;
            const checks = {
                length: val.length >= 8,
                upper: /[A-Z]/.test(val),
                lower: /[a-z]/.test(val),
                num: /[0-9]/.test(val),
                special: /[!@#$%^&*(),.?":{}|<>]/.test(val)
            };

            for (const key in checks) {
                if (checks[key]) {
                    reqs[key].classList.add('valid');
                } else {
                    reqs[key].classList.remove('valid');
                }
            }
        });
    </script>
</body>

</html>
