<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - CentriCalc</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="logo.png" alt="CentriCalc Logo" class="main-logo" onerror="this.style.display='none'">
            <h1>Recuperar Senha</h1>
            <p>Enviaremos um link para o seu e-mail</p>
        </div>

        <div id="error-alert" class="error-message"></div>
        <div id="success-alert" class="error-message"
            style="background: #f0fdf4; border-color: #bbf7d0; color: #15803d; display: none;"></div>

        <form id="forgot-password-form">
            <div class="form-group">
                <label for="email">E-mail de Cadastro</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <button type="submit" id="submit-btn" class="btn btn-primary">
                <span>Enviar Link de Recuperação</span>
                <div id="spinner" class="loading-spinner"></div>
            </button>
        </form>

        <div class="footer-links">
            <p><a href="index.html">Voltar para o Login</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
