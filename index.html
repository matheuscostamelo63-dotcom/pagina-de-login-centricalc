<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CentriCalc</title>
    <meta name="description" content="Acesse o CentriCalc - Sistema Profissional de Dimensionamento Hidráulico">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="logo.png" alt="CentriCalc Logo" class="main-logo" onerror="this.style.display='none'">
            <h1>CentriCalc</h1>
            <p>Sistema de Dimensionamento Inteligente</p>
        </div>

        <div id="error-alert" class="error-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn btn-primary">
                <span>Entrar no Sistema</span>
                <div id="spinner" class="loading-spinner"></div>
            </button>
        </form>


        <div class="footer-links">
            <p>Não tem uma conta? <a href="register.html" id="signup-link">Registre-se!</a></p>
            <p style="margin-top: 12px;"><a href="forgot-password.html" id="forgot-password">Esqueceu sua senha?</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
